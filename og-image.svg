<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Create Aeronautics</title>
  <desc id="desc">Green industrial Minecraft server artwork for Create Aeronautics with flight physics and airships.</desc>
  <defs>
